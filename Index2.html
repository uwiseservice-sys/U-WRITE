<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UWISE Write - AI 內容寫作助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <style>
    .hero-bg { background: linear-gradient(135deg, #008C8C 0%, #005F5F 100%); }
  </style>
</head>
<body class="bg-gray-50 font-sans">
  <div class="max-w-5xl mx-auto p-6">

    <!-- 英雄區 -->
    <div class="hero-bg rounded-3xl text-white p-12 text-center mb-10">
      <h1 class="text-5xl font-bold mb-3">UWISE Write</h1>
      <p class="text-2xl mb-6">用中文想法，AI 瞬間寫出專業英文內容</p>
      <div class="flex justify-center gap-4">
        <div class="bg-white/20 backdrop-blur-md px-6 py-2 rounded-2xl text-sm">✍️ 部落格</div>
        <div class="bg-white/20 backdrop-blur-md px-6 py-2 rounded-2xl text-sm">🛒 產品描述</div>
        <div class="bg-white/20 backdrop-blur-md px-6 py-2 rounded-2xl text-sm">✉️ 銷售信</div>
        <div class="bg-white/20 backdrop-blur-md px-6 py-2 rounded-2xl text-sm">📱 社群貼文</div>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl p-8">

      <!-- 類型選擇 -->
      <div class="grid grid-cols-4 gap-3 mb-8" id="type-buttons">
        <button onclick="selectType(0)" class="type-btn active flex flex-col items-center py-4 rounded-2xl border-2 border-teal-600 text-teal-600">📝<span class="text-sm mt-1">Blog Post</span></button>
        <button onclick="selectType(1)" class="type-btn flex flex-col items-center py-4 rounded-2xl border-2 border-gray-200 hover:border-teal-600">🛒<span class="text-sm mt-1">Product Desc</span></button>
        <button onclick="selectType(2)" class="type-btn flex flex-col items-center py-4 rounded-2xl border-2 border-gray-200 hover:border-teal-600">✉️<span class="text-sm mt-1">Email</span></button>
        <button onclick="selectType(3)" class="type-btn flex flex-col items-center py-4 rounded-2xl border-2 border-gray-200 hover:border-teal-600">📱<span class="text-sm mt-1">Social Post</span></button>
      </div>

      <!-- 輸入框 -->
      <textarea id="input" rows="5" class="w-full border border-gray-300 rounded-3xl p-6 text-lg focus:outline-none focus:border-teal-500 resize-none" placeholder="請輸入你的中文想法，例如：介紹一款折疊式太陽能充電板..."></textarea>

      <button onclick="generateContent()" class="mt-8 w-full bg-gradient-to-r from-teal-600 to-cyan-600 hover:from-teal-700 hover:to-cyan-700 text-white font-semibold py-5 rounded-3xl text-2xl flex items-center justify-center gap-3 shadow-lg">
        <i class="fas fa-magic"></i>
        立即生成專業英文內容
      </button>

      <!-- 結果區域 -->
      <div id="result" class="hidden mt-10">
        <div class="flex justify-between mb-4">
          <h3 class="text-2xl font-semibold">生成結果</h3>
          <button onclick="copyResult()" class="flex items-center gap-2 text-teal-600 hover:text-teal-700">
            <i class="fas fa-copy"></i> 複製
          </button>
        </div>
        <div id="output" class="bg-gray-50 border border-gray-200 rounded-3xl p-8 min-h-[260px] whitespace-pre-wrap text-gray-800 leading-relaxed"></div>
      </div>
    </div>

    <!-- 付費升級卡片 -->
    <div class="mt-8 bg-gradient-to-r from-amber-400 to-yellow-400 rounded-3xl p-8 text-center text-white">
      <div class="text-3xl font-bold mb-2">升級 Pro 版</div>
      <div class="text-5xl font-bold mb-1">$9 <span class="text-2xl font-normal">/月</span></div>
      <div class="text-xl mb-6">無限生成 + 無廣告 + 歷史紀錄</div>
      <button onclick="upgradeToPro()" class="w-full bg-white text-yellow-600 font-bold py-5 rounded-3xl text-2xl hover:scale-105 transition">
        立即升級 Airwallex 支付
      </button>
      <p class="text-xs mt-4 opacity-75">新加坡本地支付 • 支援信用卡 / Alipay / WeChat Pay</p>
    </div>

    <div class="text-center text-sm text-gray-500 mt-8">
      今日免費次數剩餘 <span id="remaining" class="font-bold text-teal-600 text-xl">10</span> 次
    </div>
  </div>

  <script>
    let remaining = 10;
    const key = "uwiseWriteRemaining";
    if (localStorage.getItem(key)) remaining = parseInt(localStorage.getItem(key));
    document.getElementById("remaining").textContent = remaining;

    let currentType = 0;
    const types = ["部落格文章", "產品描述", "銷售信件", "社群貼文"];

    function selectType(n) {
      currentType = n;
      document.querySelectorAll(".type-btn").forEach((btn, i) => {
        if (i === n) {
          btn.classList.add("active", "border-teal-600");
          btn.classList.remove("border-gray-200");
        } else {
          btn.classList.remove("active", "border-teal-600");
          btn.classList.add("border-gray-200");
        }
      });
    }

    async function generateContent() {
      const input = document.getElementById("input").value.trim();
      if (!input) return alert("請輸入中文想法");

      if (remaining <= 0) {
        alert("今日免費次數已用完，請升級 Pro 版！");
        return;
      }

      const outputEl = document.getElementById("output");
      const resultEl = document.getElementById("result");
      outputEl.innerHTML = `<div class="flex items-center justify-center h-64"><i class="fas fa-spinner fa-spin text-4xl text-teal-600"></i></div>`;
      resultEl.classList.remove("hidden");

      const prompt = `請用自然流利的英文，幫我寫一篇${types[currentType]}。主題是：${input}。請直接輸出內容，不要加任何說明。`;

      try {
        const res = await fetch("https://www.dmxapi.com/v1/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "deepseek-chat", messages: [{ role: "user", content: prompt }], temperature: 0.75 })
        });
        const data = await res.json();
        const text = data.choices[0].message.content;

        outputEl.textContent = text;
        remaining--;
        localStorage.setItem(key, remaining);
        document.getElementById("remaining").textContent = remaining;
      } catch (e) {
        outputEl.textContent = "生成失敗，請稍後再試";
      }
    }

    function copyResult() {
      const text = document.getElementById("output").textContent;
      navigator.clipboard.writeText(text).then(() => alert("✅ 已複製到剪貼簿！"));
    }

    // Airwallex 付費按鈕（請替換成你自己的 Airwallex 付款連結）
    function upgradeToPro() {
      const airwallexLink = "https://your-airwallex-payment-link-here";   // ←←← 這裡改成你 Airwallex 的付款連結
      window.open(airwallexLink, "_blank");
    }
  </script>
</body>
</html>
