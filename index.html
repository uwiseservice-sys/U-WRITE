<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UWISE Write - AI 內容寫作助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">
  <div class="max-w-5xl mx-auto p-6">

    <!-- 英雄區 -->
    <div class="hero-bg rounded-3xl text-white p-12 text-center mb-10" style="background: linear-gradient(135deg, #008C8C 0%, #005F5F 100%);">
      <h1 class="text-5xl font-bold mb-3">UWISE Write</h1>
      <p class="text-2xl mb-6">用中文想法，AI 瞬間寫出專業英文內容</p>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <!-- 類型選擇 -->
      <div class="grid grid-cols-4 gap-3 mb-8" id="type-buttons">
        <button onclick="selectType(0)" class="type-btn active flex flex-col items-center py-4 rounded-2xl border-2 border-teal-600 text-teal-600">📝<span class="text-sm mt-1">Blog Post</span></button>
        <button onclick="selectType(1)" class="type-btn flex flex-col items-center py-4 rounded-2xl border-2 border-gray-200 hover:border-teal-600">🛒<span class="text-sm mt-1">Product Desc</span></button>
        <button onclick="selectType(2)" class="type-btn flex flex-col items-center py-4 rounded-2xl border-2 border-gray-200 hover:border-teal-600">✉️<span class="text-sm mt-1">Email</span></button>
        <button onclick="selectType(3)" class="type-btn flex flex-col items-center py-4 rounded-2xl border-2 border-gray-200 hover:border-teal-600">📱<span class="text-sm mt-1">Social Post</span></button>
      </div>

      <textarea id="input" rows="5" class="w-full border border-gray-300 rounded-3xl p-6 text-lg focus:outline-none focus:border-teal-500 resize-none" placeholder="請輸入你的中文想法..."></textarea>

      <button onclick="generateContent()" class="mt-8 w-full bg-gradient-to-r from-teal-600 to-cyan-600 hover:from-teal-700 hover:to-cyan-700 text-white font-semibold py-5 rounded-3xl text-2xl flex items-center justify-center gap-3">
        <i class="fas fa-magic"></i>
        立即生成專業英文內容
      </button>

      <div id="result" class="hidden mt-10">
        <div class="flex justify-between mb-4">
          <h3 class="text-2xl font-semibold">生成結果</h3>
          <button onclick="copyResult()" class="flex items-center gap-2 text-teal-600 hover:text-teal-700">
            <i class="fas fa-copy"></i> 複製
          </button>
        </div>
        <div id="output" class="bg-gray-50 border border-gray-200 rounded-3xl p-8 min-h-[260px] whitespace-pre-wrap text-gray-800"></div>
      </div>
    </div>

    <!-- Airwallex 付費卡片 -->
    <div class="mt-8 bg-gradient-to-r from-amber-400 to-yellow-400 rounded-3xl p-8 text-center text-white">
      <div class="text-3xl font-bold mb-2">升級 Pro 版</div>
      <div class="text-5xl font-bold mb-1">$9 <span class="text-2xl font-normal">/月</span></div>
      <div class="text-xl mb-6">無限生成 + 無廣告 + 歷史紀錄</div>
      <button onclick="upgradeToPro()" class="w-full bg-white text-yellow-600 font-bold py-5 rounded-3xl text-2xl hover:scale-105 transition">
        Airwallex 審核中 • 敬請期待
      </button>
    </div>

    <div class="text-center text-sm text-gray-500 mt-8">
      今日免費次數剩餘 <span id="remaining" class="font-bold text-teal-600 text-xl">10</span> 次
    </div>
  </div>

  <script>
    let remaining = 10;
    const key = "uwiseWriteRemaining";
    if (localStorage.getItem(key)) remaining = parseInt(localStorage.getItem(key));
    document.getElementById("remaining").textContent = remaining;

    let currentType = 0;
    const types = ["blog post", "product description", "sales email", "social media post"];

    function selectType(n) {
      currentType = n;
      document.querySelectorAll(".type-btn").forEach((btn, i) => {
        if (i === n) btn.classList.add("active", "border-teal-600");
        else btn.classList.remove("active", "border-teal-600");
      });
    }

    async function generateContent() {
      const input = document.getElementById("input").value.trim();
      if (!input) return alert("請輸入中文想法");

      if (remaining <= 0) return alert("今日免費次數已用完");

      const outputEl = document.getElementById("output");
      const resultEl = document.getElementById("result");
      outputEl.innerHTML = `<div class="flex items-center justify-center h-64"><i class="fas fa-spinner fa-spin text-4xl text-teal-600"></i></div>`;
      resultEl.classList.remove("hidden");

      const prompt = `You are a professional English writer. Write a complete, natural, fluent English ${types[currentType]} about the following topic. Output ONLY in English. Do not use any Chinese characters. Do not add any explanations. Just output the full English content directly.\n\nTopic: ${input}`;

      try {
        const res = await fetch("https://www.dmxapi.com/v1/chat/completions", {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "Authorization": "Bearer sk-dTL3CBYgBxWfHndXbYCjHuoiyVFJZIWUNJStg4iGuepfn0zj"
          },
          body: JSON.stringify({ 
            model: "deepseek-chat", 
            messages: [{ role: "user", content: prompt }], 
            temperature: 0.7 
          })
        });

        const data = await res.json();
        if (data.choices && data.choices[0] && data.choices[0].message.content) {
          outputEl.textContent = data.choices[0].message.content;
          remaining--;
          localStorage.setItem(key, remaining);
          document.getElementById("remaining").textContent = remaining;
        } else {
          outputEl.textContent = "API 返回錯誤，請稍後再試";
        }
      } catch (e) {
        outputEl.textContent = "網路錯誤，請稍後再試";
      }
    }

    function copyResult() {
      navigator.clipboard.writeText(document.getElementById("output").textContent).then(() => alert("✅ 已複製！"));
    }

    function upgradeToPro() {
      alert("Airwallex 收單功能正在審核中\n\n審核通過後即可立即付費升級");
    }
  </script>
</body>
</html>
